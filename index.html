<div style="position:fixed;bottom:20px;right:20px;width:300px;background:#1e293b;border-radius:10px;padding:15px">

<h3>Micah AI</h3>

<div id="chatbox" style="height:200px;overflow:auto;background:#0f172a;padding:10px;border-radius:6px;margin-bottom:10px"></div>

<input id="userInput" placeholder="Ask Micah AI..." style="width:100%;padding:10px;border-radius:6px;border:none">

<button onclick="sendMessage()" style="margin-top:10px;width:100%;padding:10px;background:#38bdf8;border:none;border-radius:6px;font-weight:bold">Send</button>

</div>

<script>

function sendMessage(){

let input = document.getElementById("userInput").value
let chatbox = document.getElementById("chatbox")

chatbox.innerHTML += "<p><b>You:</b> " + input + "</p>"

let reply = "Micah AI: Thanks for your message. I'm learning and will soon give smarter answers!"

chatbox.innerHTML += "<p>" + reply + "</p>"

document.getElementById("userInput").value=""

}

</script>
